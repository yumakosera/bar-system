<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バー管理画面（キャンセル対応版）</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 既存のスタイルは省略せずそのまま残します */
        body { font-family: sans-serif; padding: 16px; max-width: 480px; margin: 0 auto; background-color: #1e1e24; color: #f8f9fa; }
        h2 { font-size: 20px; text-align: center; border-bottom: 1px solid #343a40; padding-bottom: 12px; margin-bottom: 20px; }
        .login-container { background-color: #2b2c34; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center; }
        .login-input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #495057; background-color: #343a40; color: white; box-sizing: border-box; }
        #admin-content { display: none; }
        select { width: 100%; padding: 14px; font-size: 16px; margin-bottom: 20px; border-radius: 6px; background-color: #343a40; color: white; border: 1px solid #495057; }
        .info-card { background-color: #2b2c34; padding: 16px; border-radius: 8px; margin-bottom: 20px; }
        .info-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 16px; }
        .current-balance { font-size: 20px; font-weight: bold; color: #fcc419; }
        .section-title { font-size: 14px; color: #adb5bd; margin: 20px 0 8px 0; text-transform: uppercase; border-bottom: 1px solid #343a40; padding-bottom: 4px; }
        button { display: block; width: 100%; padding: 14px; font-size: 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 10px; }
        button:active { opacity: 0.7; }
        .btn-quick { background-color: #2b8a3e; color: white; }
        .btn-return { background-color: #e67700; color: white; }
        .btn-login { background-color: #1c7ed6; color: white; margin-bottom: 0; }
        .btn-logout { background-color: #fa5252; color: white; padding: 8px; font-size: 14px; margin-top: 30px; }
        .flex-inputs { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; font-size: 16px; border-radius: 6px; border: 1px solid #495057; background-color: #343a40; color: white; text-align: center; }
        .btn-custom { background-color: #495057; color: white; margin-bottom: 0; }
        .btn-toggle-menu { background-color: #1c7ed6; color: white; }
        .menu-mgmt-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #343a40; font-size: 15px; }
        .btn-status { padding: 8px 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 12px; width: 80px; text-align: center; margin-bottom: 0;}
        .btn-stock-on { background-color: #2b8a3e; }
        .btn-stock-off { background-color: #fa5252; }
        .order-card { background-color: #d9480f; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(217, 72, 15, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(217, 72, 15, 0); } 100% { box-shadow: 0 0 0 0 rgba(217, 72, 15, 0); } }
        .order-info { flex: 1; }
        .order-table { font-weight: bold; font-size: 18px; margin-bottom: 4px; }
        .order-item { font-size: 16px; }
        .order-time { font-size: 12px; color: #ffc9c9; margin-top: 4px; }
        
        /* 【新設】オーダーモニターのボタンエリア */
        .order-actions { display: flex; flex-direction: column; gap: 8px; }
        .btn-serve { background-color: #ffffff; color: #d9480f; padding: 10px 16px; border-radius: 6px; font-size: 14px; margin-bottom: 0; }
        .btn-cancel { background-color: #495057; color: white; padding: 8px 16px; border-radius: 6px; font-size: 12px; margin-bottom: 0; }
        
        #no-orders { text-align: center; color: #adb5bd; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="login-screen" class="login-container">
        <h2>管理者ログイン</h2>
        <input type="email" id="login-email" class="login-input" placeholder="メールアドレス">
        <input type="password" id="login-password" class="login-input" placeholder="パスワード">
        <button class="btn-login" onclick="handleSignIn()">ログイン</button>
    </div>

    <div id="admin-content">
        <h2>BAR 管理コントロール</h2>
        
        <div class="section-title">🛎️ 現在のオーダー（未提供）</div>
        <div id="order-monitor-container">
            <div id="no-orders">現在、未提供のオーダーはありません。</div>
        </div>

        <hr style="border-color: #343a40; margin: 24px 0;">

        <div class="section-title">個別レジ操作</div>
        <select id="customer-select" onchange="fetchCustomerInfo()">
            <option value="">-- お客様を選択してください --</option>
        </select>
        <div class="info-card">
            <div class="info-row">
                <span>現在の残高:</span>
                <span><span id="customer-balance" class="current-balance">-</span> トークン</span>
            </div>
        </div>
        <button class="btn-quick" onclick="quickAction(1, 1000)">1 トークン追加 （1,000円）</button>
        <button class="btn-quick" onclick="quickAction(3, 3000)">3 トークン追加 （3,000円）</button>
        <button class="btn-quick" onclick="quickAction(5, 5000)">5 トークン追加 （5,000円）</button>
        <button class="btn-return" onclick="quickAction(1, 0)">1 トークン返却 （0円）</button>
        
        <div class="section-title">メニュー在庫管理</div>
        <button class="btn-toggle-menu" onclick="toggleMenuArea()">在庫管理を開く / 閉じる</button>
        <div id="admin-menu-area" style="display: none; background-color: #2b2c34; padding: 16px; border-radius: 8px; margin-top: 10px;">
            <div id="admin-menu-list">読み込み中...</div>
        </div>
        
        <button class="btn-logout" onclick="handleSignOut()">ログアウト</button>
    </div>

    <script>
        const supabaseUrl = 'https://sopgjigjqhtetmmmilpo.supabase.co';
        const supabaseKey = 'sb_publishable_j5J9WYL6xEue3WpLH50kQg_MumAICUP';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        let orderInterval;

        client.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadCustomers();
                fetchOrders();
                orderInterval = setInterval(fetchOrders, 10000); 
            } else {
                document.getElementById('login-screen').style.display = 'block';
                document.getElementById('admin-content').style.display = 'none';
                clearInterval(orderInterval);
            }
        });

        async function handleSignIn() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { error } = await client.auth.signInWithPassword({ email, password });
            if (error) alert('ログイン失敗: ' + error.message);
        }
        async function handleSignOut() { await client.auth.signOut(); }

        async function fetchOrders() {
            const { data, error } = await client.from('order_history')
                .select(`id, item_name, created_at, customers (name)`)
                .eq('is_served', false)
                .order('created_at', { ascending: true });

            if (error) return; 

            const container = document.getElementById('order-monitor-container');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<div id="no-orders">現在、未提供のオーダーはありません。</div>';
                return;
            }

            data.forEach(order => {
                const card = document.createElement('div');
                card.className = 'order-card';
                
                const date = new Date(order.created_at);
                const timeString = date.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
                const tableName = order.customers ? order.customers.name : '不明なテーブル';

                // 【変更点】キャンセルボタンを追加
                card.innerHTML = `
                    <div class="order-info">
                        <div class="order-table">${tableName}</div>
                        <div class="order-item">🥃 ${order.item_name}</div>
                        <div class="order-time">注文時間: ${timeString}</div>
                    </div>
                    <div class="order-actions">
                        <button class="btn-serve" onclick="markAsServed('${order.id}')">提供済</button>
                        <button class="btn-cancel" onclick="executeCancelOrder('${order.id}', '${order.item_name}')">取消・返金</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function markAsServed(orderId) {
            const { error } = await client.from('order_history').update({ is_served: true }).eq('id', orderId);
            if (!error) fetchOrders(); else alert('エラー: ' + error.message);
        }

        // 【新機能】キャンセル処理を実行する関数
        async function executeCancelOrder(orderId, itemName) {
            if (!confirm(`「${itemName}」の注文を取り消し、トークンをお客様に返却しますか？`)) return;

            const { data, error } = await client.rpc('cancel_order', { p_order_id: orderId });
            
            if (error) {
                alert('エラーが発生しました: ' + error.message);
            } else {
                fetchOrders(); // 成功したら画面を更新してリストから消す
                fetchCustomerInfo(); // レジ画面の残高表示も更新
            }
        }

        /* 以下の既存ロジックは変更なし */
        async function loadCustomers() {
            const { data } = await client.from('customers').select('id, name').order('created_at', { ascending: false });
            const select = document.getElementById('customer-select');
            select.innerHTML = '<option value="">-- お客様を選択してください --</option>';
            if (data) data.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id; option.text = c.name + ' 様'; select.appendChild(option);
            });
        }
        async function fetchCustomerInfo() {
            const customerId = document.getElementById('customer-select').value;
            if (!customerId) { document.getElementById('customer-balance').innerText = '-'; return; }
            const { data } = await client.from('customers').select('token_balance').eq('id', customerId).single();
            if (data) document.getElementById('customer-balance').innerText = data.token_balance;
        }
        function getSelectedCustomerId() {
            const id = document.getElementById('customer-select').value;
            if (!id) alert('先にお客様を選択してください。'); return id;
        }
        async function executeAction(customerId, tokens, price) {
            const { data, error } = await client.rpc('add_tokens', { p_customer_id: customerId, p_tokens: parseInt(tokens), p_price: parseInt(price) });
            if (error) alert('エラー: ' + error.message); else { alert('処理完了！'); fetchCustomerInfo(); }
        }
        function quickAction(tokens, price) {
            const customerId = getSelectedCustomerId(); if (!customerId) return;
            let msg = price === 0 ? `トークンを ${tokens}個 返却しますか？` : `現金 ${price}円を受領し、トークンを ${tokens}個 追加しますか？`;
            if (confirm(msg)) executeAction(customerId, tokens, price);
        }
        function customAction() {
            const customerId = getSelectedCustomerId(); if (!customerId) return;
            const tokens = document.getElementById('custom-tokens').value || 0;
            const price = document.getElementById('custom-price').value || 0;
            if (confirm(`トークン ${tokens}個、金額 ${price}円 で処理しますか？`)) {
                executeAction(customerId, tokens, price);
                document.getElementById('custom-tokens').value = ''; document.getElementById('custom-price').value = '';
            }
        }
        let menuVisible = false;
        function toggleMenuArea() {
            menuVisible = !menuVisible;
            document.getElementById('admin-menu-area').style.display = menuVisible ? 'block' : 'none';
            if (menuVisible) fetchAdminMenu();
        }
        async function fetchAdminMenu() {
            const { data } = await client.from('menu_items').select('id, item_name, is_sold_out').order('category', { ascending: true }).order('item_name', { ascending: true });
            const container = document.getElementById('admin-menu-list'); container.innerHTML = '';
            data.forEach(item => {
                const div = document.createElement('div'); div.className = 'menu-mgmt-item';
                const nameSpan = document.createElement('span'); nameSpan.innerText = item.item_name;
                const btn = document.createElement('button');
                btn.innerText = item.is_sold_out ? '🔴 売切' : '🟢 販売中';
                btn.className = item.is_sold_out ? 'btn-status btn-stock-off' : 'btn-status btn-stock-on';
                btn.onclick = () => toggleStock(item.id, item.item_name, item.is_sold_out);
                div.appendChild(nameSpan); div.appendChild(btn); container.appendChild(div);
            });
        }
        async function toggleStock(id, name, isSoldOut) {
            const newStatus = !isSoldOut;
            if (!confirm(newStatus ? `${name} を【売切】にしますか？` : `${name} を【販売中】に戻しますか？`)) return;
            const { error } = await client.from('menu_items').update({ is_sold_out: newStatus }).eq('id', id);
            if (!error) fetchAdminMenu(); else alert('エラー: ' + error.message);
        }
    </script>
</body>
</html>
